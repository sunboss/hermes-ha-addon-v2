name: "Hermes Agent V2"
description: "Rebuilt Hermes Agent add-on with explicit HA mappings, supervised services, and safer state handling."
version: "0.1.0"
slug: "hermes_agent_v2"
init: true
startup: "application"
homeassistant_api: true
ingress: true
ingress_port: 8099
ingress_stream: true
map:
  - share:rw
  - config:rw
arch:
  - aarch64
  - amd64
url: "https://github.com/sunboss/hermes-ha-addon-v2"
options:
  llm_model: "gpt-5.4"
  auth_mode: "api_key"
  auth_provider: "openai_web"
  openai_base_url: ""
  openai_api_key: ""
  openrouter_api_key: ""
  huggingface_api_key: ""
  hf_base_url: "https://api-inference.huggingface.co/v1"
  workspace_root: "/share/hermes/workspace"
  config_override_path: "/config/hermes/config.override.yaml"
  watch_domains: []
  watch_entities: []
  ignore_entities: []
  watch_all: false
  cooldown_seconds: 30
schema:
  llm_model: "str?"
  auth_mode: "list(api_key|web_login)"
  auth_provider: "list(openai_web|custom)"
  openai_base_url: "str?"
  openai_api_key: "password?"
  openrouter_api_key: "password?"
  huggingface_api_key: "password?"
  hf_base_url: "str?"
  workspace_root: "str?"
  config_override_path: "str?"
  watch_domains:
    - "str"
  watch_entities:
    - "match(^[a-z_][a-z0-9_]*\.[a-z0-9_]+$)"
  ignore_entities:
    - "match(^[a-z_][a-z0-9_]*\.[a-z0-9_]+$)"
  watch_all: "bool"
  cooldown_seconds: "int(0,3600)"
